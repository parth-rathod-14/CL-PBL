<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Leaderboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
       
        margin: 0;
        padding: 20px;
      }

      /* NAVBAR */

      nav {
        background-color: black;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      nav h2 {
        color: white;
        margin: 0;
      }

      nav ul {
        list-style: none;
        display: flex;
        gap: 20px;
        margin: 0;
        padding: 0;
      }

      nav ul li a {
        color: white;
        text-decoration: none;
        font-weight: bold;
      }

      /* HEADING */

      h1 {
        margin-top: 30px;
      }

      /* BUTTONS */

      .buttons {
        margin: 20px;
      }

      .buttons button {
        padding: 10px 20px;
        margin: 10px;
        border: none;
        background-color: #007bff;
        color: white;
        cursor: pointer;
        border-radius: 5px;
        font-size: 16px;
      }

      .buttons button:hover {
        background-color: #0056b3;
      }

      /* TABLE */

      table {
        width: 70%;
        margin: 20px auto;
        border-collapse: collapse;
        background-color: white;
        display: none;
      }

      th,
      td {
        border: 1px solid #ccc;
        padding: 12px;
      }

      th {
        background-color: #007bff;
        color: white;
      }

      .winner {
        color: green;
        font-weight: bold;
      }

      .runner {
        color: orange;
        font-weight: bold;
      }

      .year-table-button {
        height: 36px;
        width: 100px;
        background-color: orange;
        color: black;
        border-radius: 8px;
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .year-table-button a {
        color: white;
        text-decoration: none;
        font-size: 18px;
        font-weight: bold;
        display: block;
      }

      .year-buttons{
        display: flex;
        flex-direction: row;
        gap: 20px;
        justify-content: center;
      }

    </style>
  </head>

  <body>
    <!-- NAVBAR -->

<nav>
<h2>Deogiri's Arena</h2>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="register.html">Register</a></li>
<li><a href="schedule.html">Schedule</a></li>
<li><a href="leaderboard.html">Leaderboard</a></li>
</ul>
</nav>

    <!-- HEADING -->

    <h1>Past Year Winners</h1>
    <br>

    <!-- BUTTONS -->

    <div class="year-buttons">
      <div class="year-table-button">
        <a class="" href="Table Year1.html" style="text-decoration: none">
        1st Year</a>
      </div>

      <div class="year-table-button">
        <a href="Table Year2.html" style="text-decoration: none">
          2nd Year</a>
      </div>
      <div class="year-table-button">
        <a href="Table Year3.html" style="text-decoration: none">
          3rd Year</a>
      </div>
    </div>

    <!-- JAVASCRIPT -->

    <script>
      function showTable(yearId) {
        // Hide all tables
        let tables = document.querySelectorAll("table");

        tables.forEach(function (table) {
          table.style.display = "none";
        });

        // Show selected table
        document.getElementById(yearId).style.display = "table";
      }
    </script>
  </body>
</html>
